name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade "buildozer>=1.5.0" Cython kivy gTTS google-generativeai

      - name: Pre-accept Android Licenses
        run: |
          # මේ කොටසින් Android SDK එකට අවශ්‍ය ඔක්කොම Licenses කලින්ම Accept කරනවා
          mkdir -p "$HOME/.android"
          touch "$HOME/.android/repositories.cfg"
          # Android SDK tools හරහා licenses accept කිරීම
          yes | sdkmanager --licenses || true

      - name: Build with Buildozer
        run: |
          # කෙලින්ම බිල්ඩ් එක පටන් ගමු
          buildozer -v android debug
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "True"
          # GitHub runner එකේ Android SDK තියෙන තැන
          ANDROID_SDK_ROOT: "/usr/local/lib/android/sdk"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
